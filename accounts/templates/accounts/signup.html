{% extends 'main/base.html' %}

{% block title %} Sign Up - Planteer {% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-11 col-md-9 col-lg-6">
            <h2 class="text-center mb-4 fw-bold {% if request.COOKIES.mode == 'dark' %}text-white{% else %}text-dark{% endif %}">Create New Account</h2>
            
            <form class="d-flex flex-column gap-4 shadow p-4 p-md-5 rounded-4 bg-light border" action="{% url 'accounts:sign_up' %}" method="POST">
                {% csrf_token %}
                
                <div class="form-group">
                    <label class="fw-bold text-dark mb-2 ms-1">Username</label>
                    <input type="text" class="form-control rounded-pill px-3 py-2 shadow-sm border-2 text-dark" 
                           id="username_id" name="username" placeholder="Choose a unique username" required
                           style="background-color: #fff !important;">
                </div>

                <div class="row g-3">
                    <div class="col-12 col-md-6">
                        <div class="form-group">
                            <label class="fw-bold text-dark mb-2 ms-1">First Name</label>
                            <input type="text" class="form-control rounded-pill px-3 py-2 shadow-sm border-2 text-dark" 
                                   name="first_name" placeholder="First Name" required
                                   style="background-color: #fff !important;">
                        </div>
                    </div>
                    <div class="col-12 col-md-6">
                        <div class="form-group">
                            <label class="fw-bold text-dark mb-2 ms-1">Last Name</label>
                            <input type="text" class="form-control rounded-pill px-3 py-2 shadow-sm border-2 text-dark" 
                                   name="last_name" placeholder="Last Name" required
                                   style="background-color: #fff !important;">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="fw-bold text-dark mb-2 ms-1">Email Address</label>
                    <input type="email" class="form-control rounded-pill px-3 py-2 shadow-sm border-2 text-dark" 
                           name="email" placeholder="example@mail.com" required
                           style="background-color: #fff !important;">
                </div>

                <div class="form-group">
                    <label class="fw-bold text-dark mb-2 ms-1">Password</label>
                    <input type="password" class="form-control rounded-pill px-3 py-2 shadow-sm border-2 text-dark" 
                           name="password" placeholder="Create a strong password" required
                           style="background-color: #fff !important;">
                </div>

                <button class="btn btn-success w-100 py-2 rounded-pill fw-bold shadow-sm mt-2" type="submit">
                    <i class="fas fa-user-plus me-2"></i> Create Account
                </button>

                <p class="text-center mt-3 text-dark mb-0">
                    Already have an account? <a href="{% url 'accounts:sign_in' %}" class="text-success fw-bold text-decoration-none">Sign In</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
