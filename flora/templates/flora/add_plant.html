{% extends 'main/base.html' %}
{% load static %}

{% block title %} New Plant Entry - Planteer {% endblock %}

{% block content %}
<div class="container py-4"> 
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8"> 
            <div class="editor-container shadow-sm p-4 p-md-5 bg-body rounded border">
                
                <div class="editor-header mb-4 mb-md-5 text-center">
                    <div class="icon-badge mb-3 d-inline-block p-3 rounded-circle bg-success bg-opacity-10">
                        <i class="fas fa-leaf text-success fs-2"></i>
                    </div>
                    <h1 class="display-5 fw-bold text-body-emphasis">New <span style="color: #198754;">Plant.</span></h1>
                    <p class="text-secondary">Document a new species and its characteristics in our botanical database.</p>
                </div>
                
<form action="{% url 'flora:add_plant_view' %}" method="POST" enctype="multipart/form-data">
    
    {% include "flora/partials/plant_form.html" %}
    
    <button type="submit" class="btn btn-success mt-3">
        Add Plant
    </button>
</form>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('id_image').addEventListener('change', function() {
        if (this.files && this.files.length > 0) {
            const label = document.querySelector(`label[for="${this.id}"]`);
            const fileName = this.files[0].name;
            label.style.background = "#198754"; 
            label.style.color = "white";
            label.style.borderColor = "#198754";
            label.innerHTML = `<i class="fas fa-check-circle"></i> ${fileName.substring(0, 10)}...`;
        }
    });
</script>
{% endblock %}
