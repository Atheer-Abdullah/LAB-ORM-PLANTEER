{% extends 'main/base.html' %}
{% load static %}

{% block title %} Contact Us - Planteer {% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row align-items-start gx-5">
        
        <div class="col-md-6">
            <h1 class="fw-bold display-5 mb-2">Contact us</h1>
            <p class="text-muted mb-5">Subheading for description or instructions</p>
            
            <form action="{% url 'main:contact_us_view' %}" method="POST">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="form-label small fw-bold">First name</label>
                        <input type="text" name="first_name" class="form-control rounded-1 shadow-sm border-light-subtle" placeholder="Jane">
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="form-label small fw-bold">Last name</label>
                        <input type="text" name="last_name" class="form-control rounded-1 shadow-sm border-light-subtle" placeholder="Smitherton">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold">Email address</label>
                    <input type="email" name="email" class="form-control rounded-1 shadow-sm border-light-subtle" placeholder="email@janesfakedomain.net">
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold">Your message</label>
                    <textarea name="message" rows="5" class="form-control rounded-1 shadow-sm border-light-subtle" placeholder="Enter your question or message"></textarea>
                </div>

                <button type="submit" class="btn btn-dark w-100 py-2 mt-2 rounded-1 fw-bold">Submit</button>
            </form>
        </div>

        <div class="col-md-6 d-none d-md-block text-end">
            <div class="ps-md-5">
                <img src="{% static 'images/contact-flower.jpg' %}" class="img-fluid rounded-4 shadow-sm" alt="Contact Us Flower" style="max-height: 600px; object-fit: cover;">
            </div>
        </div>

    </div>
</div>
{% endblock %}
